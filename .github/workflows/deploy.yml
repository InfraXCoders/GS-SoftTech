name: Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy static site to Ubuntu VPS
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Copy files to VPS ──────────────────────────────────
      - name: Upload files via SCP
        uses: appleboy/scp-action@v0.1.8
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: ".,!.git,!.github,!server,!*.md"
          target: /var/www/gssofttech.com/html/
          overwrite: true

      # ── 3. Fix permissions & reload Nginx ─────────────────────
      - name: Fix permissions and reload Nginx
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            sudo chown -R www-data:www-data /var/www/gssofttech.com/html
            sudo chmod -R 755 /var/www/gssofttech.com/html
            sudo nginx -t && sudo systemctl reload nginx

      # ── 4. Done ───────────────────────────────────────────────
      - name: Deployment complete
        run: echo "✅ gssofttech.com deployed successfully"
