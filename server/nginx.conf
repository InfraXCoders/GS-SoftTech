# /etc/nginx/sites-available/gssofttech.com
# Symlink: sudo ln -s /etc/nginx/sites-available/gssofttech.com /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name gssofttech.com www.gssofttech.com;

    # Redirect all HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name gssofttech.com www.gssofttech.com;

    root /var/www/gssofttech.com/html;
    index index.html;

    # SSL — managed by Certbot (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/gssofttech.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gssofttech.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection      "1; mode=block" always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript image/svg+xml;
    gzip_min_length 256;

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Serve HTML files — no cache
    location / {
        try_files $uri $uri/ $uri.html =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Allow Let's Encrypt ACME challenge
    location ^~ /.well-known/acme-challenge/ {
        allow all;
        root /var/www/gssofttech.com/html;
    }

    # Block other hidden files (.git, .env, etc.) but NOT .well-known
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    access_log /var/log/nginx/gssofttech.com.access.log;
    error_log  /var/log/nginx/gssofttech.com.error.log;
}
